name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: runner.os == 'Linux'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --bin docgen --bin mcp --target ${{ matrix.target }}

      - name: Rename binaries
        run: |
          cp target/${{ matrix.target }}/release/docgen docgen-${{ github.ref_name }}-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/mcp mcp-${{ github.ref_name }}-${{ matrix.suffix }}

      - name: Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            docgen-${{ github.ref_name }}-${{ matrix.suffix }}
            mcp-${{ github.ref_name }}-${{ matrix.suffix }}
