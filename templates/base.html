<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ copy.site_name }} | {{ copy.site_tagline }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{{ copy.default_meta_description }}{% endblock %}">
  <link rel="canonical" href="{{ canonical_path | safe }}">
  <script type="application/ld+json">{% block jsonld %}{}{% endblock %}</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      max-width: 960px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      color: #111;
      background: #fff;
    }
    a { color: #0066cc; }
    a:hover { color: #004499; }
    nav[aria-label="Breadcrumb"] ol {
      display: flex;
      flex-wrap: wrap;
      list-style: none;
      padding: 0;
      margin: 0 0 1.5rem;
      gap: 0.25rem 0.5rem;
      font-size: 0.9em;
    }
    nav[aria-label="Breadcrumb"] li + li::before {
      content: "/";
      color: #777;
      margin-right: 0.5rem;
    }
    .badge {
      display: inline-block;
      font-size: 0.75em;
      background: #f0f0f0;
      color: #444;
      padding: 0.1em 0.5em;
      border-radius: 3px;
      font-family: monospace;
      vertical-align: middle;
    }
    .type { display: block; font-family: monospace; font-size: 0.85em; color: #555; }
    dt.req::before { content: "* "; }
    dl {
      display: grid;
      grid-template-columns: minmax(140px, max-content) 1fr;
      gap: 0.75rem 1.5rem;
      margin: 0;
    }
    dt { font-family: monospace; font-weight: 600; align-self: start; }
    dd { margin: 0; color: #333; }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
      font-size: 0.85em;
      color: #777;
    }
    nav ul { list-style: none; padding: 0; }
    nav ul li { margin: 0.4rem 0; }
  </style>
</head>
<body>
  <header>
    <nav aria-label="{{ copy.nav_label_breadcrumb }}">
      <ol>
        {% for crumb in breadcrumbs %}
        <li>
          {% if loop.last %}
            <span aria-current="page">{{ crumb.label }}</span>
          {% else %}
            <a href="{{ crumb.href | safe }}">{{ crumb.label }}</a>
          {% endif %}
        </li>
        {% endfor %}
      </ol>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>{{ copy.footer_text | safe }}</p>
  </footer>
</body>
</html>
